name: Build & Release

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  # ── Build job: runs on every push and pull request ───────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Remove any stale JARs first to avoid Maven shade plugin conflicts
      - name: Build with Maven
        working-directory: CubeTale-DiscordCHAT
        run: rm -f target/*.jar && mvn package -B --no-transfer-progress

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubeTale-DiscordCHAT-${{ github.sha }}
          path: CubeTale-DiscordCHAT/target/CubeTale-DiscordCHAT-*.jar
          if-no-files-found: error
          retention-days: 30

  # ── Release job: runs when a GitHub Release is published ────────────────────
  release:
    name: Attach JAR to Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Strip leading 'v' from tag (e.g. v1.2.0 → 1.2.0)
      - name: Extract version from release tag
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#v}"
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Releasing version: $VERSION"

      # Stamp pom.xml so the shaded JAR carries the right version number
      - name: Set pom.xml version to release tag
        working-directory: CubeTale-DiscordCHAT
        run: |
          mvn versions:set \
            -DnewVersion=${{ env.RELEASE_VERSION }} \
            -DgenerateBackupPoms=false \
            -B --no-transfer-progress

      - name: Build release JAR
        working-directory: CubeTale-DiscordCHAT
        run: rm -f target/*.jar && mvn package -B --no-transfer-progress

      - name: Upload release JAR to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CubeTale-DiscordCHAT/target/CubeTale-DiscordCHAT-*.jar
          body: |
            ## CubeTale-DiscordCHAT ${{ env.RELEASE_VERSION }}

            > **Author:** MRKIMSTERS
            > **Developer:** CubeTale Developments (MrKiro_)

            ### Installation
            1. Download `CubeTale-DiscordCHAT-${{ env.RELEASE_VERSION }}.jar`
            2. Drop it into your server's `plugins/` folder
            3. Restart the server
            4. Edit `plugins/CubeTale-DiscordCHAT/config.yml` with your Discord bot token, webhook URL, and channel IDs

            ### Requirements
            - Paper / Spigot **1.21+**
            - Java **17+**
            - A Discord bot with **Message Content Intent** enabled

            ### Optional soft-dependencies
            `LuckPerms`, `PlaceholderAPI`, `SkinsRestorer`
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
