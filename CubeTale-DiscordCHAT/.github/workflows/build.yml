name: Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: CubeTale-DiscordCHAT
        run: mvn clean package -B --no-transfer-progress

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubeTale-DiscordCHAT-${{ github.sha }}
          path: CubeTale-DiscordCHAT/target/CubeTale-DiscordCHAT-*.jar
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build release JAR
        working-directory: CubeTale-DiscordCHAT
        run: mvn clean package -B --no-transfer-progress

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: CubeTale-DiscordCHAT/target/CubeTale-DiscordCHAT-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
