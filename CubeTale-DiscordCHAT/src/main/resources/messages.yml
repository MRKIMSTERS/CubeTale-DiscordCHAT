# ===========================================
# CubeTale-DiscordCHAT Messages Configuration
# ===========================================
# Color codes: &0-9, &a-f, &k, &l, &m, &n, &o, &r
# Placeholders: {player}, {uuid}, {code}, {time}, {discord}

prefix: "&8[&9CubeTale&8-&bDiscord&8] "

link:
  already-linked: "{prefix}&cYou are already linked to Discord account &e{discord}&c!"
  prompt: "{prefix}&aTo link your account, go to Discord and type &e/link&a. Then use &e/link {code}&a in Minecraft."
  invalid-code: "{prefix}&cInvalid or expired code! Request a new one with &e/link&c."
  success: "{prefix}&aSuccessfully linked to Discord account &e{discord}&a!"
  expired: "{prefix}&cYour verification code has expired. Use &e/link&c to get a new one."

unlink:
  not-linked: "{prefix}&cYou are not linked to any Discord account."
  success: "{prefix}&aSuccessfully unlinked your Discord account."
  confirm: "{prefix}&cAre you sure you want to unlink? Type &e/unlink confirm&c to proceed."

linked:
  self: "{prefix}&aYou are linked to Discord account &e{discord}&a."
  other: "{prefix}&e{player}&a is linked to Discord account &e{discord}&a."
  self-not-linked: "{prefix}&cYou are not linked to a Discord account. Use &e/link&c to link."
  other-not-linked: "{prefix}&e{player}&c is not linked to a Discord account."

admin:
  reload-success: "{prefix}&aConfiguration reloaded successfully!"
  reload-failed: "{prefix}&cFailed to reload configuration. Check console for errors."
  status: "{prefix}&aBot Status: &e{status} &8| &aGuild: &e{guild} &8| &aLatency: &e{ping}ms"
  debug-enabled: "{prefix}&aDebug mode &2enabled&a."
  debug-disabled: "{prefix}&aDebug mode &cdisabled&a."

errors:
  no-permission: "{prefix}&cYou do not have permission to do that."
  player-only: "{prefix}&cThis command can only be run by a player."
  bot-offline: "{prefix}&cThe Discord bot is currently offline."
  usage-link: "{prefix}&cUsage: &e/link [code]"
  usage-unlink: "{prefix}&cUsage: &e/unlink"
  usage-linked: "{prefix}&cUsage: &e/linked [player]"
  player-not-found: "{prefix}&cPlayer &e{player}&c not found."
