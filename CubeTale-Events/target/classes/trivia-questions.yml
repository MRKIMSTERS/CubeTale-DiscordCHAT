# Format:
#   question: "Your question here?"
#   answers:   (list — all accepted correct answers, case-insensitive)
#     - "Answer"
#   options:   (optional — show A/B/C/D choices in chat, leave empty for open answer)
#     - "A. Answer1"
#     - "B. Answer2"
#     - "C. Answer3"
#     - "D. Answer4"
#   correct-option: "A"  (only needed when using options)

